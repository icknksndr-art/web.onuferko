<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Форма користувача</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #6e4697 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            padding: 30px;
            max-width: 500px;
            width: 100%;
        }
        h1 {
            color: #313131;
            margin-bottom: 30px;
            text-align: center;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            color: #535353;
            font-weight: bold;
        }
        input {
            width: 100%;
            padding: 10px;
            border: 2px solid #e2dfdf;
            border-radius: 5px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        input:focus {
            outline: none;
            border-color: #667eea;
        }
        input:disabled {
            background-color: #f0f0f0;
            cursor: not-allowed;
        }
        button {
            background-color: #667eea;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            margin: 5px;
            transition: background-color 0.3s;
        }
        button:hover {
            background-color: #5a67d8;
        }
        .btn-danger {
            background-color: #fc5347;
        }
        .btn-danger:hover {
            background-color: #da190b;
        }
        .btn-success {
            background-color: #50b653;
        }
        .btn-success:hover {
            background-color: #45a049;
        }
        .btn-warning {
            background-color: #ff9800;
        }
        .btn-warning:hover {
            background-color: #e68900;
        }
        .auth-section {
            border-top: 2px solid #f0ebeb;
            margin-top: 20px;
            padding-top: 20px;
        }
        .message {
            margin-top: 15px;
            padding: 10px;
            border-radius: 5px;
            text-align: center;
        }
        .success {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .error {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        .info {
            background-color: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }
        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 20px;
            flex-wrap: wrap;
        }
        .edit-mode {
            background-color: #fff3cd;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Реєстрація</h1>
        <form id="userForm">
            <div class="form-group">
                <label for="name">Повне ім'я:</label>
                <input type="text" id="name" placeholder="Введіть своє ім'я" required>
            </div>
            <div class="form-group">
                <label for="email">Емейл:</label>
                <input type="email" id="email" placeholder="Введіть свій емейл" required>
            </div>
<div class="form-group">
                <label for="phone">Номер телефона:</label>
                <input type="tel" id="phone" placeholder="Введіть свій номер телефона" required>
            </div>
            <div class="form-group">
                <label for="password">Пароль:</label>
                <input type="password" id="password" placeholder="Введіть свій пароль" required>
            </div>
            <div class="button-group">
                <button type="submit" id="saveBtn">Зберегти дані</button>
                <button type="button" id="clearBtn" class="btn-danger">Очистити дані</button>
            </div>
        </form>
        <div class="auth-section">
            <h3>Верифікаація</h3>
            <div class="form-group">
                <label for="authEmail">Емейл:</label>
                <input type="email" id="authEmail" placeholder="Введіть свій емейл">
            </div>
            <div class="form-group">
                <label for="authPassword">Пароль:</label>
                <input type="password" id="authPassword" placeholder="Введіть свій пароль">
            </div>
            <button id="loginBtn" class="btn-success">ІВвійти</button>
            <button id="logoutBtn" class="btn-warning" style="display:none;">Вийти</button>
        </div>
        <div id="message"></div>
        <div id="editSection" style="display:none;">
            <h3>Змінити профіль</h3>
            <div class="form-group">
                <label for="editName">Змінити ім'я:</label>
                <input type="text" id="editName">
            </div>
            <div class="form-group">
                <label for="editPhone">Змінити номер тетфона:</label>
                <input type="tel" id="editPhone">
            </div>
            <button id="updateBtn" class="btn-success">Оновии інформацію</button>
        </div>
    </div>
    <script src="rgstr.js"></script>
</body>
</html>
