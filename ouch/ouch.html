<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Список-сортувальник</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 50px auto;
            padding: 20px;
        }
        input, button {
            padding: 10px;
            margin: 5px;
            font-size: 16px;
        }
        ul {
            margin-top: 20px;
            list-style: none;
            padding: 0;
        }
        li {
            padding: 10px;
            margin: 5px 0;
            background-color: #f8f4f4;
            cursor: pointer;
            border-radius: 5px;
        }
        li:hover {
            background-color: #ebe8e8;
        }
        .sort-btn {
            background-color: #4c4eaf;
            color: white;
            border: none;
            cursor: pointer;
        }
        .sort-btn:hover {
            background-color: #454ea0;
        }
        .error {
            color: red;
            margin: 5px;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <h1>Список-сортувальник</h1>
    <input type="text" id="itemInput" placeholder="Введіть назву чогось...">
    <button id="addBtn">Додати щось</button>
    <button id="sortBtn" class="sort-btn">Сортувати якось, тобто за алфавітом</button>
    
    <ul id="itemList"></ul>
    
    <div id="errorMsg" class="error"></div>

    <script>
        const input = document.getElementById('itemInput');
        const addBtn = document.getElementById('addBtn');
        const sortBtn = document.getElementById('sortBtn');
        const itemList = document.getElementById('itemList');
        const errorMsg = document.getElementById('errorMsg');
        let items = [];
        function showError(message) {
            errorMsg.textContent = message;
            setTimeout(() => {
                errorMsg.textContent = '';
            }, 2000);
        }
        function clearError() {
            errorMsg.textContent = '';
        }
        function renderList() {
            itemList.innerHTML = '';
            items.forEach((item, index) => {
                const li = document.createElement('li');
                li.textContent = item;
                li.addEventListener('click', function() {
                    removeItem(index);
                });
                itemList.appendChild(li);
            });
        }
        function addItem() {
            clearError();
            let newItem = input.value.trim();
            if (newItem === '') {
                showError('Введіть щось, ну будь ласка!');
                return;
            }
            if (items.includes(newItem)) {
                showError('Вже є таке!');
                return;
            }
            items.push(newItem);
            input.value = '';
            renderList();
            input.focus();
        }
        function removeItem(index) {
            items.splice(index, 1);
            renderList();
        }
        function sortItems() {
            if (items.length === 0) {
                showError('Список пустий. Додайте хоч щось.');
                return;
            }
            items.sort((a, b) => {
                return a.localeCompare(b);
            });
            renderList();
        }
        addBtn.addEventListener('click', addItem);
        sortBtn.addEventListener('click', sortItems);
        input.addEventListener('keydown', function(event) {
            if (event.key === 'Enter') {
                event.preventDefault();
                addItem();
            }
        });
    </script>
</body>
</html>
